set-window-option -g mode-keys vi

set-option -g set-titles on
set-option -g set-titles-string "#{session_name}"

set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# Mouse scrollback — wheel enters/exits copy mode automatically
set -g mouse on
set -g history-limit 100000

# Pane navigation without prefix (Alt + arrow)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Pane resize with prefix + H/J/K/L (-r allows repeating)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
set -g repeat-time 1000

# Directional pane swap with prefix + M-H/J/K/L
bind -r M-H swap-pane -s '{left-of}'
bind -r M-L swap-pane -s '{right-of}'
bind -r M-K swap-pane -s '{up-of}'
bind -r M-J swap-pane -s '{down-of}'

# Broadcast input to all panes in the window (Prefix + S to toggle)
bind S setw synchronize-panes toggle
# Red pane border when sync is active — hard to miss
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style '#{?pane_synchronized,fg=red,fg=colour33}'
