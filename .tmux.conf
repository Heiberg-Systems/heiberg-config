set-window-option -g mode-keys vi

set-option -g set-titles on
set-option -g set-titles-string "#{session_name}"

set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

# Mouse scrollback — wheel enters/exits copy mode automatically
set -g mouse on
set -g history-limit 100000

# Pane navigation without prefix (Alt + arrow)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Directional pane swap with prefix + H/J/K/L (-r allows repeating)
bind -r H swap-pane -s '{left-of}'
bind -r L swap-pane -s '{right-of}'
bind -r K swap-pane -s '{up-of}'
bind -r J swap-pane -s '{down-of}'
